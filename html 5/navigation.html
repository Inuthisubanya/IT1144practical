<!DOCTYPE html>
<html>
<head>
<style>
  /* මෙතන තමයි container එක design කරන්නේ */
  .card-container {
    width: 300px;
    border: 1px solid #ddd;
    border-radius: 15px; /* කොන් රවුම් කරන්න */
    padding: 20px;
    text-align: center;
    background-color: #f9f9f9;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* හෙවනැල්ලක් දාන්න */
    font-family: Arial, sans-serif;
  }

  /* Container එක ඇතුළේ තියෙන image එක */
  .card-container img {
    width: 100%;
    border-radius: 10px;
  }

  /* Container එක ඇතුළේ තියෙන button එක */
  .buy-btn {
    background-color: #28a745;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="card-container">
  <img src="https://via.placeholder.com/250" alt="Product">
  <h2>Smart Watch</h2>
  <p>රු. 5,000.00 ක් වැනි අඩු මුදලකට දැන්ම ලබාගන්න.</p>
  <button class="buy-btn">Buy Now</button>
</div>

</body>
</html>
